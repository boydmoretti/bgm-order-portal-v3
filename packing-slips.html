<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BGM Packing Slips</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: #1a1a2e;
    color: #eee;
    padding: 20px;
  }

  h1 {
    text-align: center;
    color: #00d4aa;
    margin-bottom: 20px;
    font-size: 24px;
  }

  .controls {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 12px 20px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-size: 15px;
    font-weight: bold;
  }

  .btn-green { background: #00d4aa; color: #000; }
  .btn-blue { background: #4a9eff; color: #000; }
  .btn-red { background: #ff4444; color: #fff; }

  .order-card {
    background: #16213e;
    border: 1px solid #333;
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 14px;
  }

  .order-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 10px;
  }

  .customer-name {
    font-size: 20px;
    font-weight: bold;
    color: #00d4aa;
  }

  .order-meta {
    font-size: 13px;
    color: #aaa;
    margin-bottom: 8px;
  }

  .items-list {
    margin-top: 8px;
  }

  .item-row {
    padding: 4px 0;
    font-size: 14px;
    border-bottom: 1px solid #2a2a4a;
  }

  .totals {
    margin-top: 10px;
    font-size: 14px;
    color: #ccc;
  }

  /* LOGIN */
  #login-screen {
    max-width: 340px;
    margin: 80px auto;
    background: #16213e;
    padding: 30px;
    border-radius: 12px;
    text-align: center;
  }

  #login-screen h2 { margin-bottom: 20px; color: #00d4aa; }

  #login-screen input {
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #0f3460;
    color: #fff;
    font-size: 16px;
    margin-bottom: 14px;
  }

  .error-msg { color: #ff4444; margin-top: 10px; font-size: 14px; }

  /* PRINT STYLES */
  @media print {
    body { background: #fff; color: #000; padding: 0; }
    .no-print { display: none !important; }
    .print-page {
      page-break-after: always;
      padding: 30px;
      font-family: Arial, sans-serif;
    }
    .print-page:last-child { page-break-after: auto; }
    .print-name { font-size: 32px; font-weight: bold; margin-bottom: 6px; }
    .print-meta { font-size: 16px; color: #444; margin-bottom: 16px; }
    .print-divider { border-top: 2px solid #000; margin: 12px 0; }
    .print-item { font-size: 18px; padding: 8px 0; border-bottom: 1px solid #ccc; }
    .print-item-qty { font-weight: bold; }
    .print-totals { font-size: 18px; margin-top: 14px; }
    .print-total-line { padding: 4px 0; }
  }

  #print-area { display: none; }
  @media print { #print-area { display: block; } #main-content { display: none; } }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <h2>🔒 BGM Admin</h2>
  <input type="password" id="pass-input" placeholder="Enter password" />
  <br>
  <button class="btn btn-green" onclick="checkPass()">Enter</button>
  <div class="error-msg" id="login-error"></div>
</div>

<!-- MAIN CONTENT -->
<div id="main-content" style="display:none;">
  <h1>📦 BGM Packing Slips</h1>

  <div class="controls no-print">
    <button class="btn btn-green" onclick="loadOrders()">🔄 Refresh Orders</button>
    <button class="btn btn-blue" onclick="printAll()">🖨️ Print All Orders</button>
    <select id="round-filter" class="btn" style="background:#0f3460;color:#fff;" onchange="filterOrders()">
      <option value="">All Rounds</option>
    </select>
  </div>

  <div id="order-count" style="color:#aaa;margin-bottom:14px;"></div>
  <div id="orders-container"></div>
</div>

<!-- PRINT AREA -->
<div id="print-area"></div>

<script>
  const SUPABASE_URL = 'https://zilrgqnqoswtmvlmzdim.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppbHJncW5xb3N3dG12bG16ZGltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1ODI4ODAsImV4cCI6MjA4ODE1ODg4MH0.rA-2ef_hcpfWruCHzd1YeZFuKV6ylRCg1VeoR8DrVO4';
  const ADMIN_PASS = 'bgm2024';

  let allOrders = [];

  function checkPass() {
    const val = document.getElementById('pass-input').value;
    if (val === ADMIN_PASS) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      loadOrders();
    } else {
      document.getElementById('login-error').textContent = 'Wrong password.';
    }
  }

  document.getElementById('pass-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkPass();
  });

  async function loadOrders() {
    document.getElementById('orders-container').innerHTML = '<p style="color:#aaa;">Loading orders...</p>';
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/orders?select=*&order=round.desc,name.asc`, {
        headers: {
          'apikey': SUPABASE_KEY,
          'Authorization': `Bearer ${SUPABASE_KEY}`
        }
      });
      allOrders = await res.json();
      populateRoundFilter();
      renderOrders(allOrders);
    } catch(e) {
      document.getElementById('orders-container').innerHTML = '<p style="color:red;">Error loading orders.</p>';
    }
  }

  function populateRoundFilter() {
    const rounds = [...new Set(allOrders.map(o => o.round).filter(Boolean))].sort((a,b) => b-a);
    const sel = document.getElementById('round-filter');
    sel.innerHTML = '<option value="">All Rounds</option>';
    rounds.forEach(r => {
      sel.innerHTML += `<option value="${r}">Round ${r}</option>`;
    });
  }

  function filterOrders() {
    const round = document.getElementById('round-filter').value;
    const filtered = round ? allOrders.filter(o => String(o.round) === round) : allOrders;
    renderOrders(filtered);
  }

  function parseItems(items) {
    if (!items) return [];
    if (typeof items === 'string') {
      try { return JSON.parse(items); } catch { return []; }
    }
    return Array.isArray(items) ? items : [];
  }

  function renderOrders(orders) {
    const container = document.getElementById('orders-container');
    document.getElementById('order-count').textContent = `${orders.length} order${orders.length !== 1 ? 's' : ''}`;

    if (orders.length === 0) {
      container.innerHTML = '<p style="color:#aaa;text-align:center;padding:40px;">No orders found.</p>';
      return;
    }

    container.innerHTML = orders.map(order => {
      const items = parseItems(order.items);
      const itemsHtml = items.map(item =>
        `<div class="item-row">• <strong>${item.qty || 1}x</strong> ${item.name || item.code || 'Item'} — $${item.lineTotal || item.price || 0}</div>`
      ).join('');

      return `
        <div class="order-card">
          <div class="order-header">
            <div class="customer-name">${order.name || 'Unknown'}</div>
            <button class="btn btn-blue no-print" onclick="printOne(${order.id})">🖨️ Print</button>
          </div>
          <div class="order-meta">
            Round ${order.round || '—'} &nbsp;|&nbsp; ${order.date || ''} &nbsp;|&nbsp; 📱 ${order.phone || '—'} &nbsp;|&nbsp; ✉️ ${order.email || '—'}
            ${order.connection ? `&nbsp;|&nbsp; ${order.connection}` : ''}
          </div>
          <div class="items-list">${itemsHtml || '<em style="color:#888;">No items</em>'}</div>
          <div class="totals">
            Subtotal: $${order.subtotal || 0} &nbsp;|&nbsp; Shipping: $${order.shipping || 0}
            ${order.tip ? `&nbsp;|&nbsp; Tip: $${order.tip}` : ''}
            &nbsp;|&nbsp; <strong>TOTAL: $${order.total || 0}</strong>
          </div>
        </div>`;
    }).join('');
  }

  function buildPrintPage(order) {
    const items = parseItems(order.items);
    const itemsHtml = items.map(item =>
      `<div class="print-item"><span class="print-item-qty">${item.qty || 1}x</span> &nbsp; ${item.name || item.code || 'Item'} &nbsp;&nbsp; $${item.lineTotal || item.price || 0}</div>`
    ).join('');

    return `
      <div class="print-page">
        <div class="print-name">${order.name || 'Unknown'}</div>
        <div class="print-meta">Round ${order.round || '—'} &nbsp;|&nbsp; ${order.date || ''}</div>
        <div class="print-meta">📱 ${order.phone || '—'} &nbsp;|&nbsp; ✉️ ${order.email || '—'}${order.connection ? ' &nbsp;|&nbsp; ' + order.connection : ''}</div>
        <div class="print-divider"></div>
        <div>${itemsHtml || '<div class="print-item">No items</div>'}</div>
        <div class="print-divider"></div>
        <div class="print-totals">
          <div class="print-total-line">Subtotal: &nbsp; $${order.subtotal || 0}</div>
          <div class="print-total-line">Shipping: &nbsp; $${order.shipping || 0}</div>
          ${order.tip ? `<div class="print-total-line">Tip: &nbsp; $${order.tip}</div>` : ''}
          <div class="print-total-line"><strong>TOTAL: &nbsp; $${order.total || 0}</strong></div>
        </div>
      </div>`;
  }

  function printOne(id) {
    const order = allOrders.find(o => o.id === id);
    if (!order) return;
    document.getElementById('print-area').innerHTML = buildPrintPage(order);
    window.print();
  }

  function printAll() {
    const round = document.getElementById('round-filter').value;
    const orders = round ? allOrders.filter(o => String(o.round) === round) : allOrders;
    if (orders.length === 0) { alert('No orders to print.'); return; }
    document.getElementById('print-area').innerHTML = orders.map(buildPrintPage).join('');
    window.print();
  }
</script>
</body>
</html>
