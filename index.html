  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;min-height:100vh}
  #app{max-width:640px;margin:0 auto;background:#f0f4f8;min-height:100vh;position:relative}

  /* HEADER */
  .header{background:linear-gradient(135deg,#1e3a5f,#0f2542);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.4)}
  .header-row{display:flex;align-items:center;justify-content:space-between}
  .header h1{font-size:14px;font-weight:700;letter-spacing:.3px}
  .header p{font-size:10px;opacity:.7;margin-top:2px;letter-spacing:.6px;text-transform:uppercase}
  .cart-btn{background:#22c55e;color:#fff;border:none;border-radius:999px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}

  /* CLOSED BANNER */
  .closed-banner{background:#dc2626;color:#fff;text-align:center;padding:20px 16px;margin:16px;border-radius:12px;font-size:15px;font-weight:600;line-height:1.5}

  /* ROUND BADGE */
  .round-badge{background:#fff;margin:10px 14px 0;border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.08);font-size:12px;color:#475569}
  .round-badge strong{color:#0f2542;font-size:13px}

  /* SEARCH */
  .search-bar{padding:10px 14px;background:#fff;border-bottom:1px solid #e2e8f0;margin-top:8px}
  .search-bar input{width:100%;padding:9px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;outline:none}

  /* CATEGORY TABS */
  .cat-scroll{display:flex;gap:7px;padding:8px 14px;overflow-x:auto;background:#fff;border-bottom:1px solid #e2e8f0;scrollbar-width:none}
  .cat-scroll::-webkit-scrollbar{display:none}
  .cat-btn{padding:5px 11px;border-radius:999px;border:none;cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap;background:#f1f5f9;color:#475569;flex-shrink:0}
  .cat-btn.active{background:#1e3a5f;color:#fff}

  /* SECTION */
  .section-header{padding:7px 14px;display:flex;align-items:center;gap:8px;border-left:4px solid #ccc}
  .section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px}
  .section-count{font-size:10px;opacity:.6}

  /* TABLE */
  table{width:100%;border-collapse:collapse;background:#fff}
  thead th{padding:5px 10px;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid #e2e8f0;background:#f8fafc}
  th.right,td.right{text-align:right}
  tbody tr:nth-child(even){background:#f8fafc}
  tbody tr{border-bottom:1px solid #f1f5f9}
  td{padding:7px 10px;font-size:13px;vertical-align:middle}
  .sku-tag{display:inline-block;border-radius:4px;padding:1px 5px;font-size:10px;font-weight:700;margin-right:3px}
  .prod-name{font-weight:600;color:#1e293b}
  .prod-mg{font-size:11px;color:#94a3b8;display:block;margin-top:1px}
  .price-cell{font-weight:700;color:#0f2542;white-space:nowrap}
  .qty-row{display:flex;align-items:center;gap:5px;justify-content:flex-end}
  .qty-btn{width:27px;height:27px;border-radius:6px;border:none;cursor:pointer;font-size:17px;font-weight:700;display:flex;align-items:center;justify-content:center;line-height:1}
  .qty-btn.minus{background:#e2e8f0;color:#64748b}
  .qty-btn.minus.active{background:#0f2542;color:#fff}
  .qty-btn.plus{background:#0f2542;color:#fff}
  .qty-num{min-width:22px;text-align:center;font-size:14px;font-weight:700;color:#0f2542}

  /* CART BAR */
  .cart-bar{position:sticky;bottom:0;background:#0f2542;color:#fff;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 -2px 12px rgba(0,0,0,.25);z-index:100}
  .cart-bar-text{font-size:13px}
  .cart-bar-total{font-weight:700;font-size:15px}
  .cart-bar-sub{opacity:.6;font-size:11px;margin-top:1px}
  .checkout-btn{background:#22c55e;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-weight:700;font-size:14px;cursor:pointer}

  /* CHECKOUT / CONFIRM */
  .page{padding:16px;display:none}
  .page.active{display:block}
  .back-btn{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0;margin-right:10px;line-height:1}
  .card{background:#fff;border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
  .card-title{font-size:13px;font-weight:700;color:#0f2542;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #f1f5f9}
  .order-item{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid #f8fafc;font-size:13px}
  .order-item-left{}
  .order-item-name{font-weight:600;color:#1e293b}
  .order-item-detail{font-size:11px;color:#94a3b8;margin-top:2px}
  .order-item-price{font-weight:700;color:#0f2542;text-align:right}
  .order-item-each{font-size:10px;color:#94a3b8;font-weight:400}
  .total-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;color:#475569}
  .total-big{display:flex;justify-content:space-between;padding:9px 0 0;font-size:16px;font-weight:700;color:#0f2542;border-top:1px solid #e2e8f0;margin-top:4px}
  .form-input{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:15px;margin-bottom:10px;outline:none;-webkit-appearance:none}

  .venmo-handle{font-size:22px;font-weight:700;color:#008069;letter-spacing:.5px;margin:4px 0}
  .venmo-total{font-size:15px;font-weight:700;color:#0f2542;margin-top:6px}
  .venmo-sub{font-size:11px;color:#64748b;margin-top:2px}
  .disclaimer{background:#fef3c7;border:1px solid #fbbf24;border-radius:8px;padding:12px;margin-bottom:14px;font-size:13px;line-height:1.5;color:#92400e}
  .submit-btn{width:100%;background:#0f2542;color:#fff;border:none;border-radius:10px;padding:14px;font-weight:700;font-size:16px;cursor:pointer;-webkit-appearance:none}
  .submit-btn:disabled{opacity:.45;cursor:not-allowed}
  .submit-btn.green{background:#22c55e}
  .footer-note{font-size:11px;color:#94a3b8;text-align:center;margin-top:12px;padding-bottom:20px}

  /* CONFIRM */

  .confirm-icon{font-size:60px;margin-bottom:12px}
  .confirm-title{font-size:22px;font-weight:700;color:#0f2542;margin-bottom:8px}
  .confirm-text{font-size:14px;color:#64748b;margin-bottom:20px;line-height:1.5}

  /* ADMIN */
  .admin-login{padding:40px 20px;text-align:center}
  .admin-login h2{font-size:20px;font-weight:700;color:#0f2542;margin-bottom:6px}
  .admin-login p{font-size:13px;color:#64748b;margin-bottom:20px}
  .admin-wrap{padding:14px}
  .admin-section{background:#fff;border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
  .admin-section h3{font-size:13px;font-weight:700;color:#0f2542;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid #f1f5f9}
  .toggle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
  .toggle-label{font-size:13px;font-weight:600;color:#1e293b}
  .toggle{position:relative;width:48px;height:26px;display:inline-block}
  .toggle input{opacity:0;width:0;height:0}
  .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#e2e8f0;border-radius:999px;transition:.3s}
  .slider:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
  input:checked+.slider{background:#22c55e}
  input:checked+.slider:before{transform:translateX(22px)}
  .date-input{width:100%;padding:8px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;margin-bottom:8px;outline:none}
  .save-btn{background:#1e3a5f;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer}

  .order-card-info{font-size:11px;color:#64748b;margin-bottom:6px}
  .order-card-items{font-size:12px;color:#475569;line-height:1.8}

  .no-orders{text-align:center;color:#94a3b8;font-size:13px;padding:20px}

  .tab-btn{flex:1;padding:8px;border:1px solid #e2e8f0;border-radius:8px;background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:#475569}

// ============================================================
// STATE
// ============================================================
let state = {
  screen: "browse", // browse | checkout | confirm | admin
  cart: {},
  form: {name:"",phone:"",email:""},
  activeCategory: "All",
  search: "",
  roundOpen: true,
  roundNum: 2,
  openDate: "",
  closeDate: "",
  orders: JSON.parse(localStorage.getItem("bgm_orders")||"[]"),
  adminAuth: false,
  adminTab: "orders",
};

// ============================================================
// HELPERS
// ============================================================
function cartItems(){
  return PRODUCTS.filter(p=>state.cart[p.sku]>0).map(p=>({...p,qty:state.cart[p.sku]}));
}
function subtotal(){return cartItems().reduce((s,i)=>s+i.price*i.qty,0)}
function total(){return subtotal()+SHIPPING}
function cartCount(){return cartItems().reduce((s,i)=>s+i.qty,0)}

function categories(){
  const cats = [...new Set(PRODUCTS.map(p=>p.cat))];
  return ["All",...cats];
}

function filteredProducts(){
  let list = PRODUCTS;
  if(state.activeCategory!=="All") list=list.filter(p=>p.cat===state.activeCategory);
  if(state.search){
    const q=state.search.toLowerCase();
    list=list.filter(p=>p.name.toLowerCase().includes(q)||p.sku.toLowerCase().includes(q)||p.mg.toLowerCase().includes(q));
  }
  return list;
}

function grouped(){
  const g={};
  filteredProducts().forEach(p=>{
    if(!g[p.cat])g[p.cat]=[];
    g[p.cat].push(p);
  });
  return g;
}

function saveOrder(){
  const order = {
    id: Date.now(),
    round: state.roundNum,
    date: new Date().toLocaleString(),
    name: state.form.name,
    phone: state.form.phone,
    email: state.form.email,
    items: cartItems(),
    subtotal: subtotal(),
    shipping: SHIPPING,
    total: total(),
  };
  state.orders.push(order);
  localStorage.setItem("bgm_orders",JSON.stringify(state.orders));
}

function vivianSummary(){
  // Consolidate all orders for current round
  const roundOrders = state.orders.filter(o=>o.round===state.roundNum);
  const totals={};
  roundOrders.forEach(o=>{
    o.items.forEach(i=>{
      if(!totals[i.sku]) totals[i.sku]={sku:i.sku,price:i.price,qty:0};
      totals[i.sku].qty+=i.qty;
    });
  });
  let lines = Object.values(totals).map(t=>{
    const lineTotal = t.price*t.qty;
    const skuPad = t.sku.padEnd(8);
    const qtyStr = (t.qty+" box").padEnd(7);
    const priceStr = ("$"+t.price).padEnd(7);
    return `${skuPad}= ${qtyStr}  ${priceStr}  $${lineTotal}`;
  });
  const grandTotal = Object.values(totals).reduce((s,t)=>s+t.price*t.qty,0);
  lines.push("");
  lines.push("GRAND TOTAL:           $"+grandTotal);
  return lines.join("\n");
}

function render(){
  const app = document.getElementById("app");
  if(state.screen==="browse") app.innerHTML = renderBrowse();
  else if(state.screen==="checkout") app.innerHTML = renderCheckout();
  else if(state.screen==="confirm") app.innerHTML = renderConfirm();
  else if(state.screen==="admin") app.innerHTML = renderAdmin();
  attachEvents();
}

      ${state.screen==="browse" && cartCount()>0 ? `<button class="cart-btn" onclick="goCheckout()">🛒 ${cartCount()} kit${cartCount()>1?"s":""}</button>`:""}

}

// ============================================================
// EVENTS
// ============================================================
function attachEvents(){
  // Qty buttons
  document.querySelectorAll("[data-sku]").forEach(btn=>{
    btn.addEventListener("click",()=>{
      const sku = btn.dataset.sku;
      const delta = parseInt(btn.dataset.delta);
      const cur = state.cart[sku]||0;
      const next = Math.max(0,cur+delta);
      if(next===0) delete state.cart[sku];
      else state.cart[sku]=next;
      render();
    });
  });

  // Search
  const si = document.getElementById("search-input");
  if(si) si.addEventListener("input",e=>{state.search=e.target.value;state.activeCategory="All";render()});

  // Category buttons
  document.querySelectorAll("[data-cat]").forEach(btn=>{
    btn.addEventListener("click",()=>{state.activeCategory=btn.dataset.cat;state.search="";render()});
  });

  // Form inputs
  ["name","phone","email"].forEach(f=>{
    const el=document.getElementById("inp-"+f);
    if(el) el.addEventListener("input",e=>{state.form[f]=e.target.value;updateSubmitBtn()});
  });

  updateSubmitBtn();
}

function updateSubmitBtn(){
  const btn=document.getElementById("submit-btn");
  if(!btn)return;
  const ok = state.form.name&&state.form.phone&&state.form.email;
  btn.disabled=!ok;
}

function goCheckout(){state.screen="checkout";render()}
function goBack(){state.screen="browse";render()}
function goAdmin(){state.screen="admin";render()}
function adminLogout(){state.adminAuth=false;state.screen="browse";render()}
function newOrder(){state.cart={};state.form={name:"",phone:"",email:""};state.screen="browse";render()}

function setAdminTab(tab){state.adminTab=tab;render()}

function submitOrder(){
  if(!state.form.name||!state.form.phone||!state.form.email)return;
  saveOrder();
  state.screen="confirm";
  render();
}

function adminLogin(){
  const pw=document.getElementById("admin-pw").value;
  if(pw===ADMIN_PASSWORD){state.adminAuth=true;render();}
  else{document.getElementById("admin-err").textContent="Incorrect password";}
}

function saveSettings(){
  state.roundOpen=document.getElementById("round-toggle").checked;
  state.closeDate=document.getElementById("close-date").value;
  render();
}

function copyVivian(){
  const text=document.getElementById("vivian-text").innerText;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById("copy-btn");
    btn.textContent="✅ Copied!";
    btn.classList.add("copied");
    setTimeout(()=>{btn.textContent="📋 Copy to Clipboard";btn.classList.remove("copied")},2000);
  });
}

// ============================================================
// INIT
// ============================================================
render();
</script>
