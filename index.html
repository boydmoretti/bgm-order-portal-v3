*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;min-height:100vh}
#app{max-width:640px;margin:0 auto;background:#f0f4f8;min-height:100vh}

.header{background:linear-gradient(135deg,#1e3a5f,#0f2542);color:#fff;padding:14px 16px;position:sticky;top:0;z-index:200;box-shadow:0 2px 12px rgba(0,0,0,.4)}
.header-row{display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:14px;font-weight:700}
.header p{font-size:10px;opacity:.7;margin-top:2px;letter-spacing:.6px;text-transform:uppercase}
.cart-btn{background:#22c55e;color:#fff;border:none;border-radius:999px;padding:6px 14px;font-size:13px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}
.back-btn{background:none;border:none;color:#fff;font-size:22px;cursor:pointer;padding:0;margin-right:10px}
.admin-gear{background:none;border:none;color:rgba(255,255,255,0.3);font-size:11px;cursor:pointer;margin-left:8px}

.round-badge{background:#fff;margin:10px 14px 0;border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px rgba(0,0,0,.08);font-size:12px;color:#475569}
.round-badge strong{color:#0f2542;font-size:13px}
.open-dot{color:#22c55e;font-weight:700}

.search-bar{padding:10px 14px;background:#fff;border-bottom:1px solid #e2e8f0;margin-top:8px}
.search-bar input{width:100%;padding:9px 12px;border:1px solid #cbd5e1;border-radius:8px;font-size:14px;outline:none}

.closed-banner{background:#dc2626;color:#fff;text-align:center;padding:20px 16px;margin:16px;border-radius:12px;font-size:15px;font-weight:600;line-height:1.5}
.tip-box{background:linear-gradient(135deg,#fbbf24,#f59e0b);border-radius:14px;padding:16px;margin:12px 0;color:#fff;}
.tip-box .tip-title{font-size:16px;font-weight:800;margin-bottom:4px}
.tip-box .tip-desc{font-size:13px;opacity:0.9;margin-bottom:12px}
.tip-select{width:100%;padding:10px;border-radius:8px;border:none;font-size:15px;font-weight:700;color:#92400e;background:#fff;cursor:pointer}
.conn-box{background:#4c1d95;border-radius:14px;padding:16px;margin:12px 0}
.conn-title{font-size:15px;font-weight:700;color:#fff;margin-bottom:4px}
.conn-sub{font-size:12px;color:#ddd6fe;margin-bottom:10px}
.conn-select{width:100%;padding:10px;border-radius:8px;border:none;font-size:14px;color:#1e1b4b;background:#fff;margin-bottom:8px}
.conn-input{width:100%;padding:10px;border-radius:8px;border:none;font-size:14px;color:#1e1b4b;background:#fff;box-sizing:border-box}
.jump-bar{display:flex;gap:7px;padding:8px 14px 12px;overflow-x:auto;background:#fff;border-bottom:1px solid #e2e8f0;-webkit-overflow-scrolling:touch;cursor:grab}
.jump-bar::-webkit-scrollbar{height:4px}
.jump-bar::-webkit-scrollbar-track{background:#f1f5f9}
.jump-bar::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:999px}
.jump-btn{padding:5px 12px;border-radius:999px;border:none;cursor:pointer;font-size:11px;font-weight:600;white-space:nowrap;background:#f1f5f9;color:#475569;flex-shrink:0}
.jump-btn:active{background:#1e3a5f;color:#fff}

/* PRODUCT TABLE */
table{width:100%;border-collapse:collapse;margin-top:8px}
thead th{padding:6px 10px;font-size:10px;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #e2e8f0;background:#f8fafc}
th.r,td.r{text-align:right}
tbody tr{border-bottom:1px solid rgba(0,0,0,0.05)}
td{padding:7px 10px;font-size:13px;vertical-align:middle}
.sku{display:inline-block;border-radius:4px;padding:1px 6px;font-size:10px;font-weight:800;margin-right:4px;background:rgba(0,0,0,0.08);color:rgba(0,0,0,0.6)}
.pname{font-weight:600;color:#1e293b}
.pmg{font-size:11px;color:#94a3b8;display:block;margin-top:1px}
.pprice{font-weight:700;color:#0f2542;white-space:nowrap}

.qrow{display:flex;align-items:center;gap:5px;justify-content:flex-end}
.qbtn{width:29px;height:29px;border-radius:7px;border:none;cursor:pointer;font-size:19px;font-weight:700;display:flex;align-items:center;justify-content:center;-webkit-appearance:none}
.qbtn.plus{background:#22c55e;color:#fff}
.qbtn.minus{background:#e2e8f0;color:#aaa}
.qbtn.minus.on{background:#dc2626;color:#fff}
.qnum{min-width:22px;text-align:center;font-size:14px;font-weight:700;color:#0f2542}

/* CART BAR */
.cart-bar{position:sticky;bottom:0;background:#0f2542;color:#fff;padding:11px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 -2px 12px rgba(0,0,0,.3);z-index:100}

.cb-sub{opacity:.6;font-size:11px;margin-top:1px}
.co-btn{background:#22c55e;color:#fff;border:none;border-radius:8px;padding:10px 18px;font-weight:700;font-size:14px;cursor:pointer}

.page{padding:16px}
.card{background:#fff;border-radius:12px;padding:14px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.card-title{font-size:13px;font-weight:700;color:#0f2542;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #f1f5f9}
.oitem{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid #f8fafc;font-size:13px}
.oname{font-weight:600;color:#1e293b}
.odetail{font-size:11px;color:#94a3b8;margin-top:2px}
.oprice{font-weight:700;color:#0f2542;text-align:right;flex-shrink:0;margin-left:8px}
.oeach{font-size:10px;color:#94a3b8;font-weight:400}
.trow{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;color:#475569}
.tbig{display:flex;justify-content:space-between;padding:9px 0 0;font-size:16px;font-weight:700;color:#0f2542;border-top:1px solid #e2e8f0;margin-top:4px}
.finput{width:100%;padding:10px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:15px;margin-bottom:10px;outline:none;-webkit-appearance:none}

.vhandle{font-size:22px;font-weight:700;color:#008069;letter-spacing:.5px;margin:6px 0;text-decoration:none;display:block}
.vtotal{font-size:15px;font-weight:700;color:#0f2542;margin-top:6px}
.vsub{font-size:11px;color:#64748b;margin-top:2px}

.sbtn{width:100%;background:#0f2542;color:#fff;border:none;border-radius:10px;padding:14px;font-weight:700;font-size:16px;cursor:pointer;-webkit-appearance:none}

.fnote{font-size:11px;color:#94a3b8;text-align:center;margin-top:12px;padding-bottom:20px}

.conf-title{font-size:22px;font-weight:700;color:#0f2542;margin-bottom:8px}

.tgl{position:relative;width:48px;height:26px;display:inline-block}
.tgl input{opacity:0;width:0;height:0}
.sld{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#e2e8f0;border-radius:999px;transition:.3s}
.sld:before{position:absolute;content:"";height:20px;width:20px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.sld{background:#22c55e}
input:checked+.sld:before{transform:translateX(22px)}

async function supaGet(table,filter=""){

function bind(){
  document.querySelectorAll("[data-s]").forEach(b=>b.addEventListener("click",()=>{
    const s=b.dataset.s,d=parseInt(b.dataset.d),n=Math.max(0,(S.cart[s]||0)+d);
    if(n===0)delete S.cart[s];else S.cart[s]=n;
    // Update just this row without full re-render
    const row=b.closest("tr");
    if(row){
      const qnum=row.querySelector(".qnum");
      if(qnum)qnum.textContent=n;
      const minus=row.querySelector(".qbtn.minus");
      if(minus){if(n>0)minus.classList.add("on");else minus.classList.remove("on");}
    }
    // Update cart bar
    const total=sub();const count=cc();
    let bar=document.querySelector(".cart-bar");
    if(count>0){
      if(bar){
        bar.querySelector(".cb-total").textContent=count+" kit"+(count>1?"s":"")+" · $"+total;
        bar.querySelector(".cb-sub").textContent="+ $"+SHIP+" shipping = $"+tot();
      } else {
        bar=document.createElement("div");
        bar.className="cart-bar";
        bar.innerHTML=`<div><div class="cb-total">${count} kit${count>1?"s":""} · $${total}</div><div class="cb-sub">+ $${SHIP} shipping = $${tot()}</div></div><button class="co-btn" onclick="gc()">Checkout →</button>`;
        document.body.appendChild(bar);
      }
    } else {if(bar)bar.remove();}
  }));
  const jb=document.querySelector(".jump-bar");
  if(jb){
    jb.addEventListener("wheel",e=>{e.preventDefault();jb.scrollLeft+=e.deltaY;},{passive:false});
    let isDown=false,startX,scrollLeft;
    jb.addEventListener("mousedown",e=>{isDown=true;startX=e.pageX-jb.offsetLeft;scrollLeft=jb.scrollLeft;});
    jb.addEventListener("mouseleave",()=>isDown=false);
    jb.addEventListener("mouseup",()=>isDown=false);
    jb.addEventListener("mousemove",e=>{if(!isDown)return;e.preventDefault();const x=e.pageX-jb.offsetLeft;jb.scrollLeft=scrollLeft-(x-startX);});
  }
  const si=document.getElementById("si");
  if(si){
    si.addEventListener("input",e=>{
      S.search=e.target.value;
      // Only update the table rows, not the whole page - keeps keyboard open
      const tbody=document.querySelector("tbody");
      const noRes=document.querySelector(".empty");
      const filtered=fl();
      if(filtered.length===0){
        if(tbody)tbody.closest("table").outerHTML=`<div class="empty">No products found for "${S.search}" — <button onclick="S.search='';render()" style="background:none;border:none;color:#1e3a5f;font-weight:700;cursor:pointer">Clear</button></div>`;
      } else {
        const newRows=filtered.map(p=>{const q=S.cart[p.sku]||0;return `<tr style="background:${p.c}"><td><span class="sku">${p.sku}</span><span class="pname">${p.name}</span><span class="pmg">${p.mg}</span></td><td class="r pprice">$${p.price}</td><td class="r"><div class="qrow"><button class="qbtn minus${q>0?" on":""}" data-s="${p.sku}" data-d="-1">−</button><span class="qnum">${q}</span><button class="qbtn plus" data-s="${p.sku}" data-d="1">+</button></div></td></tr>`;}).join("");
        if(tbody)tbody.innerHTML=newRows;
        else if(noRes)noRes.outerHTML=`<table><thead><tr><th>SKU / Product</th><th class="r">Price/Kit</th><th class="r" style="width:100px">Qty</th></tr></thead><tbody>${newRows}</tbody></table>`;
      }
      // Re-attach qty button events
      document.querySelectorAll("[data-s]").forEach(b=>b.addEventListener("click",()=>{const s=b.dataset.s,d=parseInt(b.dataset.d),n=Math.max(0,(S.cart[s]||0)+d);if(n===0)delete S.cart[s];else S.cart[s]=n;render();}));
    });
    si.focus();
  }
  const fn=document.getElementById("fn");if(fn)fn.addEventListener("input",e=>{S.form.name=e.target.value;ub();});
  const fp=document.getElementById("fp");if(fp)fp.addEventListener("input",e=>{S.form.phone=e.target.value;ub();});
  const fe=document.getElementById("fe");if(fe)fe.addEventListener("input",e=>{S.form.email=e.target.value;ub();});
  const tipSel=document.getElementById("tipsel");
  if(tipSel)tipSel.addEventListener("change",e=>{
    S.tip=parseInt(e.target.value)||0;
    // Update totals inline without re-rendering
    const vtotal=document.querySelector(".vtotal");
    const vsub=document.querySelector(".vsub");
    const tbig=document.querySelector(".tbig span:last-child");
    if(vtotal)vtotal.textContent="$"+tot().toFixed(2)+" due";
    if(vsub)vsub.textContent="$"+sub()+" products + $"+SHIP+" shipping"+(S.tip>0?" + $"+S.tip+" tip":"");
    if(tbig)tbig.textContent="$"+tot().toFixed(2);
  });
  ub();
}
function ub(){const b=document.getElementById("sbtn");if(b)b.disabled=!(S.form.name&&S.form.phone&&S.form.email);}
function gc(){S.screen="checkout";S.tip=0;render();}
function gb(){S.screen="browse";render();}
function ga(){S.screen="admin";render();}
function jumpTo(name){S.search=name;render();}
function alo(){S.adminAuth=false;S.screen="browse";render();}
function newOrd(){S.cart={};S.form={name:"",phone:"",email:""};S.screen="browse";render();}
function sat(t){S.adminTab=t;if(t==="orders"&&S.adminAuth)loadOrders().then(()=>render());else render();}
async function submit(){
  if(!S.form.name||!S.form.phone||!S.form.email)return;
  const connSel=document.getElementById("connsel");
  const connOther=document.getElementById("connother");
  const tipSel=document.getElementById("tipsel");
  if(tipSel)S.tip=parseInt(tipSel.value)||0;
  let conn=connSel?connSel.value:"";
  if(conn==="Other")conn=connOther?connOther.value.trim():"";
  if(!conn){alert("Please select or enter your connection name.");return;}
  S.connection=conn;
  const btn=document.getElementById("sbtn");
  if(btn){btn.disabled=true;btn.textContent="Submitting...";}
  await saveOrd();S.screen="confirm";render();
}
function alog(){const pw=document.getElementById("apw").value;if(pw===PASS){S.adminAuth=true;loadOrders().then(()=>render());}else document.getElementById("aerr").textContent="Incorrect password";}
// saveSt is now defined above with Supabase
function cpy(){const t=document.getElementById("vt").innerText;navigator.clipboard.writeText(t).then(()=>{const b=document.getElementById("cpybtn");b.textContent="✅ Copied!";b.classList.add("done");setTimeout(()=>{b.textContent="📋 Copy to Clipboard";b.classList.remove("done");},2000);});}

loadSettings().then(()=>render());
</script>
</body>
